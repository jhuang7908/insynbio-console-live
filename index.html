<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InSynBio Console — Login</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: radial-gradient(circle at top right, rgba(33,199,217,.10), transparent 30%), #090d16;
  color: #e5edf7; font: 13px/1.55 "Inter", system-ui, sans-serif;
  display: flex; align-items: center; justify-content: center;
}
.gate-panel {
  width: min(380px, 92vw);
  background: #0f1726; border: 1px solid #253246; border-radius: 12px;
  padding: 28px 24px; box-shadow: 0 20px 60px rgba(0,0,0,.6);
}
.gate-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
.gate-mark {
  width: 32px; height: 32px; border-radius: 50%;
  border: 1px solid #21c7d9; color: #21c7d9;
  display: flex; align-items: center; justify-content: center;
  font: 700 13px "JetBrains Mono", monospace;
}
.gate-title { color: #21c7d9; font-weight: 700; font-size: 15px; }
.gate-sub { color: #8ea0b8; font-size: 11px; margin-top: 2px; }
label { display: block; font-size: 10px; color: #8ea0b8; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .08em; }
input {
  width: 100%; padding: 9px 11px; border-radius: 7px;
  border: 1px solid #253246; background: #0d1520; color: #e5edf7;
  font: 13px "JetBrains Mono", monospace; margin-bottom: 12px;
  outline: none; transition: border .2s;
}
input:focus { border-color: #21c7d9; }
.gate-btn {
  width: 100%; padding: 10px; border-radius: 7px; border: none;
  background: #21c7d9; color: #090d16; font: 600 13px system-ui;
  cursor: pointer; transition: background .2s;
}
.gate-btn:hover { background: #0ea5b7; }
.gate-err {
  font-size: 11px; color: #f85149; margin-top: 8px;
  min-height: 1.2em; text-align: center;
}
.gate-ok { color: #3fb950; }
.gate-note {
  font-size: 10px; color: #8ea0b8; margin-top: 14px;
  text-align: center; line-height: 1.5;
}
</style>
</head>
<body>
<form class="gate-panel" id="gate-form" onsubmit="return doLogin(event)">
  <div class="gate-logo">
    <div class="gate-mark">IS</div>
    <div>
      <div class="gate-title">InSynBio Console</div>
      <div class="gate-sub">Authorized Evaluation Access Only</div>
    </div>
  </div>
  <label for="user">Username</label>
  <input id="user" name="user" type="text" autocomplete="username" placeholder="e.g. zhanglab" autofocus />
  <label for="pass">Password</label>
  <input id="pass" name="pass" type="password" autocomplete="current-password" placeholder="••••••••••" />
  <button type="submit" class="gate-btn">Access Console</button>
  <div id="err" class="gate-err"></div>
  <div class="gate-note">
    This console is for authorized algorithm evaluation only.<br>
    Unauthorized access is prohibited.
  </div>
</form>

<script>
var CREDS = { "zhanglab": "insynbio2026" };
var LS_AUTH = "insynbio_gate_auth";

function doLogin(ev) {
  if (ev) ev.preventDefault();
  var u = (document.getElementById("user").value || "").trim().toLowerCase();
  var p = document.getElementById("pass").value || "";
  var err = document.getElementById("err");
  err.className = "gate-err";
  err.textContent = "";
  if (!u || !p) { err.textContent = "Please enter both username and password."; return false; }
  if (CREDS[u] && CREDS[u] === p) {
    try { sessionStorage.setItem(LS_AUTH, u); } catch (e) {}
    err.className = "gate-err gate-ok";
    err.textContent = "Authenticated. Loading console...";
    setTimeout(function() { window.location.href = "console.html"; }, 400);
  } else {
    err.textContent = "Invalid credentials. Contact your InSynBio coordinator.";
  }
  return false;
}

if (sessionStorage.getItem(LS_AUTH)) {
  window.location.replace("console.html");
}
</script>
</body>
</html>
